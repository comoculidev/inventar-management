<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mənim İnventarım - İnventar İdarəetmə Sistemi</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>İnventar</h2>
                <p>İstifadəçi Paneli</p>
            </div>
            <ul class="nav-menu">
                <li>
                    <a href="/user-panel">
                        <span class="nav-icon">📊</span>
                        <span>İdarə Paneli</span>
                    </a>
                </li>
                <li class="active">
                    <a href="/user-panel/my-items">
                        <span class="nav-icon">📦</span>
                        <span>Mənim İnventarım</span>
                    </a>
                </li>
                <li>
                    <a href="/user-panel/profile">
                        <span class="nav-icon">👤</span>
                        <span>Profilim</span>
                    </a>
                </li>
            </ul>
            <div class="nav-footer">
                <a href="#" onclick="logout()" class="logout-btn">
                    <span class="nav-icon">👋</span>
                    <span>Çıxış</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="admin-header">
                <div class="header-left">
                    <h1>Mənim İnventarım</h1>
                    <p>Mənim məsul olduğum inventar elementləri</p>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="current-user">İstifadəçi</span>
                        <span id="user-role" class="badge badge-success">İstifadəçi</span>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h2>Mənim İnventar Elementlərim</h2>
                </div>

                <!-- Filter Bar -->
                <div class="filter-bar">
                    <div class="form-group">
                        <label>Axtarış</label>
                        <input type="text" id="search-input" placeholder="İnventar nömrəsi, yerləşməsi...">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="status-filter">
                            <option value="">Bütün statuslar</option>
                            <option value="active">Aktiv</option>
                            <option value="inactive">Qeyri-aktiv</option>
                            <option value="maintenance">Təmirdə</option>
                            <option value="lost">İtkin</option>
                        </select>
                    </div>
                    <button class="btn btn-info" onclick="applyFilters()">
                        Tətbiq Et
                    </button>
                    <button class="btn" onclick="resetFilters()">
                        Sıfırla
                    </button>
                </div>

                <!-- Items Table -->
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>İnventar Nömrəsi</th>
                                <th>Yerləşməsi</th>
                                <th>Status</th>
                                <th>Kateqoriya</th>
                                <th>Otaq</th>
                                <th>Bina</th>
                                <th>Təşkilat</th>
                            </tr>
                        </thead>
                        <tbody id="items-table-body">
                            <!-- Items will be loaded here -->
                            <tr>
                                <td colspan="7" class="text-center">Yüklənir...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination">
                    <button class="btn" id="prev-page" onclick="previousPage()">Öncəki</button>
                    <span id="page-info">Səhifə 1 / 1</span>
                    <button class="btn" id="next-page" onclick="nextPage()">Növbəti</button>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/user-my-items.js"></script>
</body>
</html>
