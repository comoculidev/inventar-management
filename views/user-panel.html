<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İstifadəçi Paneli - İnventar İdarəetmə Sistemi</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>İnventar</h2>
                <p>İstifadəçi Paneli</p>
            </div>
            <ul class="nav-menu">
                <li class="active">
                    <a href="/user-panel">
                        <span class="nav-icon"><i class="fas fa-chart-line"></i></span>
                        <span>İdarə Paneli</span>
                    </a>
                </li>
                <li>
                    <a href="/user-panel/my-items">
                        <span class="nav-icon"><i class="fas fa-boxes"></i></span>
                        <span>Mənim İnventarım</span>
                    </a>
                </li>
                <li>
                    <a href="/user-panel/profile">
                        <span class="nav-icon"><i class="fas fa-user"></i></span>
                        <span>Profilim</span>
                    </a>
                </li>
            </ul>
            <div class="nav-footer">
                <a href="#" onclick="logout()" class="logout-btn">
                    <span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span>
                    <span>Çıxış</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="admin-header">
                <div class="header-left">
                    <h1>İstifadəçi Paneli</h1>
                    <p>Xoş gəlmisiniz!</p>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="current-user">İstifadəçi</span>
                        <span id="user-role" class="badge badge-success">İstifadəçi</span>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <h2>Şəxsi Statistika</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-box"></i></div>
                        <div class="stat-info">
                            <span class="stat-value" id="total-my-items">0</span>
                            <span class="stat-label">Mənim Elementlərim</span>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-info">
                            <span class="stat-value" id="total-active">0</span>
                            <span class="stat-label">Aktiv</span>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-exclamation-circle"></i></div>
                        <div class="stat-info">
                            <span class="stat-value" id="total-pending">0</span>
                            <span class="stat-label">Gözləyir</span>
                        </div>
                    </div>
                </div>

                <div class="quick-actions">
                    <h3>Sürətli əməliyyatlar</h3>
                    <div class="action-buttons">
                        <a href="/user-panel/my-items" class="btn btn-primary">
                            <span><i class="fas fa-list"></i></span> Mənim İnventarım
                        </a>
                        <a href="/user-panel/profile" class="btn btn-primary">
                            <span><i class="fas fa-user-edit"></i></span> Profilim
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/user-panel.js"></script>
    <script>
        // Logout function
        async function logout() {
            try {
                const response = await fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = '/login';
            }
        }
        
        // Load user info
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/auth/me', {
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                if (data.success && data.data) {
                    document.getElementById('current-user').textContent = data.data.username;
                }
            } catch (error) {
                console.error('Error loading user info:', error);
            }
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadUserInfo();
        });
    </script>
</body>
</html>
