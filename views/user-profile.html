<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilim - İnventar İdarəetmə Sistemi</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>İnventar</h2>
                <p>İstifadəçi Paneli</p>
            </div>
            <ul class="nav-menu">
                <li>
                    <a href="/user-panel">
                        <span class="nav-icon">📊</span>
                        <span>İdarə Paneli</span>
                    </a>
                </li>
                <li>
                    <a href="/user-panel/my-items">
                        <span class="nav-icon">📦</span>
                        <span>Mənim İnventarım</span>
                    </a>
                </li>
                <li class="active">
                    <a href="/user-panel/profile">
                        <span class="nav-icon">👤</span>
                        <span>Profilim</span>
                    </a>
                </li>
            </ul>
            <div class="nav-footer">
                <a href="#" onclick="logout()" class="logout-btn">
                    <span class="nav-icon">👋</span>
                    <span>Çıxış</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="admin-header">
                <div class="header-left">
                    <h1>Profilim</h1>
                    <p>İstifadəçi məlumatlarım</p>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="current-user">İstifadəçi</span>
                        <span id="user-role" class="badge badge-success">İstifadəçi</span>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="card profile-card">
                    <h2>İstifadəçi Məlumatları</h2>
                    
                    <div class="profile-info">
                        <div class="profile-field">
                            <label>İstifadəçi Adı</label>
                            <span id="profile-username">-</span>
                        </div>
                        <div class="profile-field">
                            <label>Rolu</label>
                            <span id="profile-role">-</span>
                        </div>
                        <div class="profile-field">
                            <label>Qeydiyyat Tarixi</label>
                            <span id="profile-created">-</span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>Təhlükəsizlik</h2>
                    <p>Şifrəni dəyişmək üçün admin ilə əlaqə saxlayın.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/user-profile.js"></script>
</body>
</html>
