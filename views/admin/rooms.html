<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaqlar - İnventar İdarəetmə Sistemi</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>İnventar</h2>
                <p>İdarə Paneli</p>
            </div>
            <ul class="nav-menu">
                <li>
                    <a href="/admin/dashboard">
                        <span class="nav-icon"><i class="fas fa-chart-line"></i></span>
                        <span>İdarə Paneli</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/organizations">
                        <span class="nav-icon"><i class="fas fa-building"></i></span>
                        <span>Təşkilatlar</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/buildings">
                        <span class="nav-icon"><i class="fas fa-city"></i></span>
                        <span>Binalar</span>
                    </a>
                </li>
                <li class="active">
                    <a href="/admin/rooms">
                        <span class="nav-icon"><i class="fas fa-door-open"></i></span>
                        <span>Otaqlar</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/inventory">
                        <span class="nav-icon"><i class="fas fa-boxes"></i></span>
                        <span>İnventar</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/users">
                        <span class="nav-icon"><i class="fas fa-users"></i></span>
                        <span>İstifadəçilər</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/history">
                        <span class="nav-icon"><i class="fas fa-history"></i></span>
                        <span>Tarixçə</span>
                    </a>
                </li>
            </ul>
            <div class="nav-footer">
                <a href="#" onclick="logout()" class="logout-btn">
                    <span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span>
                    <span>Çıxış</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="admin-header">
                <div class="header-left">
                    <h1>Otaqlar</h1>
                    <p>Bütün otaqların idarə edilməsi</p>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="current-user">İstifadəçi</span>
                        <span id="user-role" class="badge badge-info">Admin</span>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h2>Otaqlar Siyahısı</h2>
                    <div class="page-actions">
                        <button class="btn btn-primary" onclick="openAddRoomModal()">
                            <i class="fas fa-plus"></i> Yeni Otaq
                        </button>
                    </div>
                </div>

                <div class="filter-bar">
                    <div class="form-group">
                        <label for="search-rooms">Axtarış</label>
                        <div class="input-wrapper">
                            <i class="fas fa-search"></i>
                            <input type="text" id="search-rooms" placeholder="Otaq adını daxil edin...">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="organization-room-filter">Təşkilat</label>
                        <select id="organization-room-filter">
                            <option value="">Bütün təşkilatlar</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="building-room-filter">Bina</label>
                        <select id="building-room-filter">
                            <option value="">Bütün binalar</option>
                        </select>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="loadRooms()">
                        <i class="fas fa-filter"></i> Filtrə et
                    </button>
                </div>

                <div class="card">
                    <div class="card-header">
                        Otaqlar
                    </div>
                    <div class="table-responsive">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Otaq Adı</th>
                                    <th>Bina</th>
                                    <th>Təşkilat</th>
                                    <th>Tutumu</th>
                                    <th>Təsviri</th>
                                    <th>Əməliyyatlar</th>
                                </tr>
                            </thead>
                            <tbody id="rooms-table-body">
                                <tr>
                                    <td colspan="6" class="text-center">Yüklənir...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Room Modal -->
    <div class="modal" id="add-room-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Yeni Otaq</h3>
                <button class="modal-close" onclick="closeAddRoomModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="add-room-form">
                    <div class="form-group">
                        <label for="room-name">Otaq Adı</label>
                        <div class="input-wrapper">
                            <i class="fas fa-door-open"></i>
                            <input type="text" id="room-name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="room-building">Bina</label>
                        <select id="room-building" required>
                            <option value="">Seçin</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="room-capacity">Tutumu</label>
                            <div class="input-wrapper">
                                <i class="fas fa-users"></i>
                                <input type="number" id="room-capacity" min="1" value="1">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="room-status">Status</label>
                            <select id="room-status">
                                <option value="active">Aktiv</option>
                                <option value="inactive">Qeyri-aktiv</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="room-description">Təsviri</label>
                        <div class="input-wrapper">
                            <i class="fas fa-align-left"></i>
                            <textarea id="room-description" rows="3"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeAddRoomModal()">
                    Ləğv et
                </button>
                <button type="button" class="btn btn-primary" onclick="addRoom()">
                    <i class="fas fa-save"></i> Yadda saxla
                </button>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/admin/rooms.js"></script>
    <script>
        // Logout function
        async function logout() {
            try {
                const response = await fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = '/login';
            }
        }
        
        // Modal functions
        function openAddRoomModal() {
            document.getElementById('add-room-modal').classList.add('active');
        }
        
        function closeAddRoomModal() {
            document.getElementById('add-room-modal').classList.remove('active');
        }
        
        // Add room function
        function addRoom() {
            if (typeof addNewRoom === 'function') {
                addNewRoom();
            }
        }
        
        // Load rooms function
        function loadRooms() {
            if (typeof loadRoomsData === 'function') {
                loadRoomsData();
            }
        }
        
        // Load user info
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/auth/me', {
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                if (data.success && data.data) {
                    document.getElementById('current-user').textContent = data.data.username;
                    const roleBadge = document.getElementById('user-role');
                    roleBadge.textContent = data.data.role === 'admin' ? 'Admin' : 'İstifadəçi';
                    roleBadge.className = `badge badge-${data.data.role === 'admin' ? 'info' : 'success'}`;
                }
            } catch (error) {
                console.error('Error loading user info:', error);
            }
        }
        
        // Close modals on outside click
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadUserInfo();
        });
    </script>
</body>
</html>
