<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarixçə - İnventar İdarəetmə Sistemi</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>İnventar</h2>
                <p>İdarə Paneli</p>
            </div>
            <ul class="nav-menu">
                <li>
                    <a href="/admin/dashboard">
                        <span class="nav-icon"><i class="fas fa-chart-line"></i></span>
                        <span>İdarə Paneli</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/organizations">
                        <span class="nav-icon"><i class="fas fa-building"></i></span>
                        <span>Təşkilatlar</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/buildings">
                        <span class="nav-icon"><i class="fas fa-city"></i></span>
                        <span>Binalar</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/rooms">
                        <span class="nav-icon"><i class="fas fa-door-open"></i></span>
                        <span>Otaqlar</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/inventory">
                        <span class="nav-icon"><i class="fas fa-boxes"></i></span>
                        <span>İnventar</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/users">
                        <span class="nav-icon"><i class="fas fa-users"></i></span>
                        <span>İstifadəçilər</span>
                    </a>
                </li>
                <li class="active">
                    <a href="/admin/history">
                        <span class="nav-icon"><i class="fas fa-history"></i></span>
                        <span>Tarixçə</span>
                    </a>
                </li>
            </ul>
            <div class="nav-footer">
                <a href="#" onclick="logout()" class="logout-btn">
                    <span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span>
                    <span>Çıxış</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="admin-header">
                <div class="header-left">
                    <h1>Tarixçə</h1>
                    <p>Bütün dəyişikliklərin tarixçəsi</p>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="current-user">İstifadəçi</span>
                        <span id="user-role" class="badge badge-info">Admin</span>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h2>Dəyişikliklər Tarixçəsi</h2>
                    <div class="page-actions">
                        <button class="btn btn-success" onclick="exportHistory()">
                            <i class="fas fa-file-export"></i> Excelə ixrac et
                        </button>
                    </div>
                </div>

                <div class="filter-bar">
                    <div class="form-group">
                        <label for="start-date">Başlanğıc Tarix</label>
                        <div class="input-wrapper">
                            <i class="fas fa-calendar-alt"></i>
                            <input type="date" id="start-date">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="end-date">Bitmə Tarix</label>
                        <div class="input-wrapper">
                            <i class="fas fa-calendar-alt"></i>
                            <input type="date" id="end-date">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="action-type">Əməliyyat Növü</label>
                        <select id="action-type">
                            <option value="">Bütün əməliyyatlar</option>
                            <option value="create">Yaradıldı</option>
                            <option value="update">Yeniləndi</option>
                            <option value="delete">Silindi</option>
                            <option value="login">Daxil oldu</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="search-history">Axtarış</label>
                        <div class="input-wrapper">
                            <i class="fas fa-search"></i>
                            <input type="text" id="search-history" placeholder="Açar söz daxil edin...">
                        </div>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="loadHistory()">
                        <i class="fas fa-filter"></i> Filtrə et
                    </button>
                </div>

                <div class="card">
                    <div class="card-header">
                        Tarixçə Qeydləri
                    </div>
                    <div class="table-responsive">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Tarix</th>
                                    <th>Təşkilat</th>
                                    <th>Bina</th>
                                    <th>Otaq</th>
                                    <th>Məsul Şəxs</th>
                                    <th>Əməliyyat</th>
                                    <th>Ətraflı</th>
                                </tr>
                            </thead>
                            <tbody id="history-table-body">
                                <tr>
                                    <td colspan="7" class="text-center">Yüklənir...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/admin/history.js"></script>
    <script>
        // Logout function
        async function logout() {
            try {
                const response = await fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = '/login';
            }
        }
        


        // Load user info
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/auth/me', {
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                if (data.success && data.data) {
                    document.getElementById('current-user').textContent = data.data.username;
                    const roleBadge = document.getElementById('user-role');
                    roleBadge.textContent = data.data.role === 'admin' ? 'Admin' : 'İstifadəçi';
                    roleBadge.className = `badge badge-${data.data.role === 'admin' ? 'info' : 'success'}`;
                }
            } catch (error) {
                console.error('Error loading user info:', error);
            }
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadUserInfo();
        });
    </script>
</body>
</html>
